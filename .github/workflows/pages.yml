# Publish to GitHub Pages by mirroring main -> gh-pages.
# (The site was auto-enabled from the gh-pages branch; the Pages REST API is
# not accessible to the workflow token, so we deploy the legacy-branch way.)
name: Publish HARMONY

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys: never let a newer run cancel one in flight. Prevents the
# GitHub Pages build queue from thrashing when several pushes land close
# together (which previously left the site stuck on an older build).
concurrency:
  group: harmony-pages-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push -f origin gh-pages
